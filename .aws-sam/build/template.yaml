AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Research OS Serverless Architecture Includes Amazon API Gateway, AWS
  Lambda, Amazon S3, Amazon DynamoDB, and Amazon ECS Fargate

  '
Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Environment:
      Variables:
        AWS_S3_BUCKET:
          Ref: DocumentStorageBucket
        AWS_DYNAMODB_TABLE:
          Ref: TaskMetadataTable
        API_HOST: '0.0.0.0'
        API_PORT: 8000
    Tracing: Active
Resources:
  ResearchOSApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ResearchOSApiFunction
      Handler: backend.main.handler
      Runtime: python3.12
      Architectures:
      - arm64
      Events:
        CatchAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TaskMetadataTable
      - S3CrudPolicy:
          BucketName:
            Ref: DocumentStorageBucket
      - Statement:
        - Effect: Allow
          Action:
          - bedrock:InvokeModel
          Resource: '*'
    Metadata:
      SamResourceId: ResearchOSApiFunction
  DocumentStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: research-os-docs-${AWS::AccountId}-${AWS::Region}
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - GET
          - PUT
          - POST
          - DELETE
          - HEAD
          AllowedOrigins:
          - '*'
  TaskMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: JobID
        AttributeType: S
      KeySchema:
      - AttributeName: JobID
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TableName: ResearchOSTaskMetadata
Outputs:
  ResearchOSApi:
    Description: API Gateway endpoint URL for Prod environment
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
