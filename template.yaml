AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Research OS Serverless Architecture
  Includes Amazon API Gateway, AWS Lambda, Amazon S3, Amazon DynamoDB, and Amazon ECS Fargate

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Environment:
      Variables:
        AWS_S3_BUCKET: !Ref DocumentStorageBucket
        AWS_DYNAMODB_TABLE: !Ref TaskMetadataTable
        API_HOST: "0.0.0.0"
        API_PORT: 8000
    Tracing: Active

Resources:
  # API Gateway + Lambda Integration
  ResearchOSApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: backend.main.handler
      Runtime: python3.12
      Architectures:
        - arm64
      Events:
        CatchAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TaskMetadataTable
        - S3CrudPolicy:
            BucketName: !Ref DocumentStorageBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"

  # Amazon S3 for PDF Storage
  DocumentStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "research-os-docs-${AWS::AccountId}-${AWS::Region}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ["*"]

  # Amazon DynamoDB for Metadata Audit Trail
  TaskMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: JobID
          AttributeType: S
      KeySchema:
        - AttributeName: JobID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TableName: "ResearchOSTaskMetadata"

  # ECS / Fargate configuration for Background Workers
  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ResearchOSWorker
      Cpu: "1024"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: celery_worker
          Image: researchos/worker:latest # Replace with ECR URI
          Essential: true
          Environment:
            - Name: REDIS_URL
              Value: "redis://your-elasticache-endpoint:6379/0"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: "/ecs/research-os-worker"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # Roles for ECS
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: WorkerPolicies
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                  - dynamodb:*
                  - bedrock:InvokeModel
                Resource: "*"

Outputs:
  ResearchOSApi:
    Description: "API Gateway endpoint URL for Prod environment"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
